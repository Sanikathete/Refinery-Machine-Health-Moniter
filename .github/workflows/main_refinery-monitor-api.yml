name: CI and optional deploy - refinery-monitor-api

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  BACKEND_DIR: backend
  FRONTEND_DIR: frontend
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Basic import and syntax sanity check
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          python -m compileall -q core refinery_backend

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Build frontend (Vite)
        working-directory: ${{ env.FRONTEND_DIR }}
        run: |
          npm ci
          npm run build

      - name: Upload backend artifact for deploy
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            backend/
            !backend/venv/
            !backend/__pycache__/
            !backend/**/*.pyc
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: ${{ github.event_name != 'pull_request' && secrets.AZUREAPPSERVICE_CLIENTID_38CF5B96AC2C45A0882D7D5B2C47FB30 != '' && secrets.AZUREAPPSERVICE_TENANTID_690C16ED531646C6A05ED8B821EB4707 != '' && secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F088CFDF562D435D9F3D3BD39577672D != '' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from CI
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_38CF5B96AC2C45A0882D7D5B2C47FB30 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_690C16ED531646C6A05ED8B821EB4707 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F088CFDF562D435D9F3D3BD39577672D }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: refinery-monitor-api
          slot-name: Production
          package: backend
